openapi: 3.1.0
info:
  title: LLMPool Admin REST API
  description: |
    RESTful management interface for LLMPool administration.
    All endpoints require JWT authentication via the `x-admin-token` header.
    All list endpoints support pagination via `page` and `page_size` query parameters.
  version: 1.0.0
  license:
    name: MIT

servers:
  - url: http://localhost:19324/api/v1
    description: Local development server

security:
  - AdminToken: []

components:
  securitySchemes:
    AdminToken:
      type: apiKey
      in: header
      name: x-admin-token
      description: JWT token signed with the admin JWT secret configured in `llmpool.toml`.

  schemas:
    # --- Pagination ---
    PaginationInfo:
      type: object
      required: [page, page_size, total, total_pages]
      properties:
        page:
          type: integer
          format: int64
          description: Current page number (1-based)
          example: 1
        page_size:
          type: integer
          format: int64
          description: Number of items per page
          example: 20
        total:
          type: integer
          format: int64
          description: Total number of items
          example: 42
        total_pages:
          type: integer
          format: int64
          description: Total number of pages
          example: 3

    # --- Error ---
    ErrorResponse:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
          description: Error code
          example: not_found
        message:
          type: string
          description: Human-readable error message
          example: "Consumer with id 999 not found"

    # --- Endpoint ---
    EndpointResponse:
      type: object
      required: [id, name, api_base, has_responses_api, tags, proxies, status, description, created_at, updated_at]
      properties:
        id:
          type: integer
          format: int32
          example: 1
        name:
          type: string
          example: OpenAI
        api_base:
          type: string
          example: https://api.openai.com/v1
        has_responses_api:
          type: boolean
          example: true
        tags:
          type: array
          items:
            type: string
          example: ["openai", "production"]
        proxies:
          type: array
          items:
            type: string
          example: []
        status:
          type: string
          enum: [online, offline, maintenance]
          example: online
        description:
          type: string
          example: "OpenAI production endpoint"
        created_at:
          type: string
          format: date-time
          example: "2026-03-19T12:00:00"
        updated_at:
          type: string
          format: date-time
          example: "2026-03-19T12:00:00"

    CreateEndpointRequest:
      type: object
      required: [name, api_key, api_base]
      properties:
        name:
          type: string
          description: A display name for the endpoint
          example: OpenAI
        api_key:
          type: string
          description: The API key for the endpoint
          example: sk-xxx
        api_base:
          type: string
          description: The base URL of the endpoint
          example: https://api.openai.com/v1
        tags:
          type: array
          items:
            type: string
          default: []
          example: ["openai"]
        proxies:
          type: array
          items:
            type: string
          default: []
          example: []

    UpdateEndpointRequest:
      type: object
      properties:
        name:
          type: string
          description: The display name for the endpoint
        tags:
          type: array
          items:
            type: string
        proxies:
          type: array
          items:
            type: string
        description:
          type: string
        status:
          type: string
          enum: [online, offline, maintenance]

    EndpointWithModelsResponse:
      type: object
      required: [endpoint, models]
      properties:
        endpoint:
          $ref: '#/components/schemas/EndpointResponse'
        models:
          type: array
          items:
            $ref: '#/components/schemas/ModelResponse'

    PaginatedEndpoints:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/EndpointResponse'
        pagination:
          $ref: '#/components/schemas/PaginationInfo'

    # --- Model ---
    ModelResponse:
      type: object
      required: [id, endpoint_id, model_id, has_chat_completion, has_embedding, has_image_generation, has_speech, input_token_price, output_token_price, description, created_at, updated_at]
      properties:
        id:
          type: integer
          format: int32
          example: 1
        endpoint_id:
          type: integer
          format: int32
          example: 1
        model_id:
          type: string
          example: gpt-4o
        has_chat_completion:
          type: boolean
          example: true
        has_embedding:
          type: boolean
          example: false
        has_image_generation:
          type: boolean
          example: false
        has_speech:
          type: boolean
          example: false
        input_token_price:
          type: string
          description: Price per input token (decimal string)
          example: "0.000005"
        output_token_price:
          type: string
          description: Price per output token (decimal string)
          example: "0.000015"
        description:
          type: string
          example: "GPT-4o model for general chat"
        created_at:
          type: string
          format: date-time
          example: "2026-03-19T12:00:00"
        updated_at:
          type: string
          format: date-time
          example: "2026-03-19T12:00:00"

    UpdateModelRequest:
      type: object
      properties:
        description:
          type: string
          description: Description of the model
        input_token_price:
          type: string
          description: Price per input token (decimal string, must not be negative)
        output_token_price:
          type: string
          description: Price per output token (decimal string, must not be negative)

    PaginatedModels:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ModelResponse'
        pagination:
          $ref: '#/components/schemas/PaginationInfo'

    # --- Consumer ---
    ConsumerResponse:
      type: object
      required: [id, name, is_active, created_at, updated_at]
      properties:
        id:
          type: integer
          format: int32
          example: 1
        name:
          type: string
          example: alice
        is_active:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
          example: "2026-03-19T12:00:00"
        updated_at:
          type: string
          format: date-time
          example: "2026-03-19T12:00:00"

    CreateConsumerRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          description: The name for the new consumer
          example: alice
        initial_credit:
          type: string
          description: |
            Optional initial credit amount to add to the consumer's fund after creation.
            If greater than zero, a credit balance change will be created and applied asynchronously.
            Must not be negative.
          example: "100.00"

    UpdateConsumerRequest:
      type: object
      properties:
        name:
          type: string
          description: New name for the consumer
        is_active:
          type: boolean
          description: Whether the consumer is active

    PaginatedConsumers:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ConsumerResponse'
        pagination:
          $ref: '#/components/schemas/PaginationInfo'

    # --- Fund ---
    FundResponse:
      type: object
      required: [id, consumer_id, cash, credit, debt, created_at, updated_at]
      properties:
        id:
          type: integer
          format: int32
          example: 1
        consumer_id:
          type: integer
          format: int32
          example: 1
        cash:
          type: string
          description: Cash balance (decimal string)
          example: "100.00"
        credit:
          type: string
          description: Credit balance (decimal string)
          example: "50.00"
        debt:
          type: string
          description: Debt balance (decimal string)
          example: "0"
        created_at:
          type: string
          format: date-time
          example: "2026-03-19T12:00:00"
        updated_at:
          type: string
          format: date-time
          example: "2026-03-19T12:00:00"

    # --- API Key ---
    OpenAIAPIKeyResponse:
      type: object
      required: [id, apikey, label, is_active, created_at, updated_at]
      properties:
        id:
          type: integer
          format: int32
          example: 1
        consumer_id:
          type: integer
          format: int32
          nullable: true
          example: 1
        apikey:
          type: string
          example: "sk-llmpool-abc123..."
        label:
          type: string
          example: "production key"
        is_active:
          type: boolean
          example: true
        expires_at:
          type: string
          format: date-time
          nullable: true
          example: "2027-01-01T00:00:00"
        created_at:
          type: string
          format: date-time
          example: "2026-03-19T12:00:00"
        updated_at:
          type: string
          format: date-time
          example: "2026-03-19T12:00:00"

    CreateApiKeyRequest:
      type: object
      properties:
        label:
          type: string
          description: Optional label describing the purpose of this API key
          default: ""
          example: "production key"

    PaginatedApiKeys:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/OpenAIAPIKeyResponse'
        pagination:
          $ref: '#/components/schemas/PaginationInfo'

    # --- Balance Change ---
    BalanceChangeResponse:
      type: object
      required: [id, consumer_id, unique_request_id, content, is_applied, created_at]
      properties:
        id:
          type: integer
          format: int32
          example: 1
        consumer_id:
          type: integer
          format: int32
          example: 1
        unique_request_id:
          type: string
          description: Client-provided idempotency key
          example: "deposit-20260326-001"
        content:
          type: object
          description: JSON object describing the balance change details
          example: {"type": "deposit", "amount": "100.00"}
        is_applied:
          type: boolean
          description: Whether the balance change has been applied
          example: false
        created_at:
          type: string
          format: date-time
          example: "2026-03-19T12:00:00"

    CreateDepositRequest:
      type: object
      required: [consumer_id, unique_request_id, amount]
      properties:
        consumer_id:
          type: integer
          format: int32
          description: The ID of the consumer to deposit to
          example: 1
        unique_request_id:
          type: string
          description: Client-provided idempotency key
          example: "deposit-20260326-001"
        amount:
          type: string
          description: The deposit amount (must be positive, decimal string)
          example: "100.00"

    CreateWithdrawRequest:
      type: object
      required: [consumer_id, unique_request_id, amount]
      properties:
        consumer_id:
          type: integer
          format: int32
          description: The ID of the consumer to withdraw from
          example: 1
        unique_request_id:
          type: string
          description: Client-provided idempotency key
          example: "withdraw-20260326-001"
        amount:
          type: string
          description: The withdrawal amount (must be positive, decimal string)
          example: "50.00"

    CreateCreditRequest:
      type: object
      required: [consumer_id, unique_request_id, amount]
      properties:
        consumer_id:
          type: integer
          format: int32
          description: The ID of the consumer to credit
          example: 1
        unique_request_id:
          type: string
          description: Client-provided idempotency key
          example: "credit-20260326-001"
        amount:
          type: string
          description: The credit amount (must be positive, decimal string)
          example: "200.00"

    # --- Endpoint Tags ---
    TagsResponse:
      type: object
      required: [endpoint_id, tags]
      properties:
        endpoint_id:
          type: integer
          format: int32
          example: 1
        tags:
          type: array
          items:
            type: string
          example: ["openai", "production"]

    AddTagRequest:
      type: object
      required: [tag]
      properties:
        tag:
          type: string
          description: The tag string to add
          example: "production"

    # --- Endpoint Test ---
    TestEndpointRequest:
      type: object
      required: [api_key, api_base]
      properties:
        api_key:
          type: string
          description: The API key for the endpoint
          example: sk-xxx
        api_base:
          type: string
          description: The base URL of the endpoint
          example: https://api.openai.com/v1

    ModelFeaturesResponse:
      type: object
      required: [model_id, owned_by, has_chat_completion, has_embedding, has_image_generation, has_speech]
      properties:
        model_id:
          type: string
          example: gpt-4o
        owned_by:
          type: string
          example: openai
        has_chat_completion:
          type: boolean
          example: true
        has_embedding:
          type: boolean
          example: false
        has_image_generation:
          type: boolean
          example: false
        has_speech:
          type: boolean
          example: false

    TestEndpointResponse:
      type: object
      required: [has_responses_api, models]
      properties:
        has_responses_api:
          type: boolean
          example: true
        models:
          type: array
          items:
            $ref: '#/components/schemas/ModelFeaturesResponse'

    # --- Session Event ---
    SessionEventResponse:
      type: object
      required: [id, session_id, session_index, consumer_id, model_id, api_key_id, input_token_price, input_tokens, output_token_price, output_tokens, event_data, created_at]
      properties:
        id:
          type: integer
          format: int64
          example: 1
        session_id:
          type: string
          example: "sess-abc123"
        session_index:
          type: integer
          format: int32
          example: 0
        consumer_id:
          type: integer
          format: int32
          example: 1
        model_id:
          type: integer
          format: int32
          example: 1
        api_key_id:
          type: integer
          format: int32
          example: 1
        input_token_price:
          type: string
          description: Price per input token at the time of the event (decimal string)
          example: "0.000005"
        input_tokens:
          type: integer
          format: int64
          description: Number of input tokens consumed
          example: 150
        output_token_price:
          type: string
          description: Price per output token at the time of the event (decimal string)
          example: "0.000015"
        output_tokens:
          type: integer
          format: int64
          description: Number of output tokens used
          example: 200
        event_data:
          type: object
          description: JSON object containing the session event data
        created_at:
          type: string
          format: date-time
          example: "2026-03-19T12:00:00"

    PaginatedSessionEvents:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/SessionEventResponse'
        pagination:
          $ref: '#/components/schemas/PaginationInfo'

  parameters:
    PageParam:
      name: page
      in: query
      description: Page number (1-based)
      required: false
      schema:
        type: integer
        format: int64
        default: 1
        minimum: 1
    PageSizeParam:
      name: page_size
      in: query
      description: Number of items per page
      required: false
      schema:
        type: integer
        format: int64
        default: 20
        minimum: 1
        maximum: 100

paths:
  # ==================== Endpoints ====================
  /endpoints:
    get:
      tags: [Endpoints]
      summary: List all OpenAI endpoints
      description: Returns a paginated list of OpenAI endpoints.
      operationId: listEndpoints
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Paginated list of endpoints
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEndpoints'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [Endpoints]
      summary: Create a new endpoint
      description: |
        Creates a new OpenAI-compatible endpoint by detecting its features and saving
        the endpoint along with its models to the database.
      operationId: createEndpoint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEndpointRequest'
      responses:
        '201':
          description: Endpoint created successfully with detected models
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EndpointWithModelsResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Failed to detect endpoint features from remote API
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /endpoints/{endpoint_id}:
    get:
      tags: [Endpoints]
      summary: Get an endpoint by ID
      description: Returns a single endpoint by its ID.
      operationId: getEndpointById
      parameters:
        - name: endpoint_id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Endpoint details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EndpointResponse'
        '404':
          description: Endpoint not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags: [Endpoints]
      summary: Update an endpoint
      description: |
        Updates an existing endpoint. Only the provided fields will be updated.
      operationId: updateEndpointById
      parameters:
        - name: endpoint_id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEndpointRequest'
      responses:
        '200':
          description: Endpoint updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EndpointResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Endpoint not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /endpoint_by_name/{name}:
    get:
      tags: [Endpoints]
      summary: Get an endpoint by name
      description: Returns a single endpoint by its name.
      operationId: getEndpointByName
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Endpoint details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EndpointResponse'
        '404':
          description: Endpoint not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ==================== Endpoint Tags ====================
  /endpoints/{endpoint_id}/tags:
    get:
      tags: [Endpoint Tags]
      summary: List endpoint tags
      description: Returns the list of tags for a given endpoint.
      operationId: listEndpointTags
      parameters:
        - name: endpoint_id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Tags for the endpoint
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagsResponse'
        '404':
          description: Endpoint not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [Endpoint Tags]
      summary: Add a tag to an endpoint
      description: Adds a tag to the specified endpoint. If the tag already exists, it is not duplicated.
      operationId: addEndpointTag
      parameters:
        - name: endpoint_id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddTagRequest'
      responses:
        '200':
          description: Tag added (or already existed), returns updated tags
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagsResponse'
        '400':
          description: Validation error (empty tag)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Endpoint not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /endpoints/{endpoint_id}/tags/{tag}:
    delete:
      tags: [Endpoint Tags]
      summary: Remove a tag from an endpoint
      description: Removes a tag from the specified endpoint.
      operationId: removeEndpointTag
      parameters:
        - name: endpoint_id
          in: path
          required: true
          schema:
            type: integer
            format: int32
        - name: tag
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Tag removed, returns updated tags
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagsResponse'
        '404':
          description: Endpoint not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ==================== Endpoint Tests ====================
  /endpoint-tests:
    post:
      tags: [Endpoint Tests]
      summary: Test an endpoint
      description: |
        Tests an OpenAI-compatible endpoint by detecting its supported features.
        This does NOT save anything to the database — it only probes the remote API.
      operationId: testEndpoint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestEndpointRequest'
      responses:
        '200':
          description: Feature detection results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestEndpointResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Failed to detect endpoint features
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ==================== Models ====================
  /models:
    get:
      tags: [Models]
      summary: List models
      description: Returns a paginated list of OpenAI models with optional filters.
      operationId: listModels
      parameters:
        - name: endpoint_id
          in: query
          description: Filter by endpoint ID
          required: false
          schema:
            type: integer
            format: int32
        - name: endpoint_name
          in: query
          description: Filter by endpoint name
          required: false
          schema:
            type: string
        - name: name
          in: query
          description: Filter by model name (model_id)
          required: false
          schema:
            type: string
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Paginated list of models
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedModels'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /models/{model_id}:
    get:
      tags: [Models]
      summary: Get a model by ID
      description: Returns a single model by its ID.
      operationId: getModelById
      parameters:
        - name: model_id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Model details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelResponse'
        '404':
          description: Model not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags: [Models]
      summary: Update a model
      description: |
        Updates an existing model. Only the provided fields will be updated.
      operationId: updateModelById
      parameters:
        - name: model_id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateModelRequest'
      responses:
        '200':
          description: Model updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelResponse'
        '400':
          description: Validation error (negative price)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Model not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ==================== Consumers ====================
  /consumers:
    get:
      tags: [Consumers]
      summary: List all consumers
      description: Returns a paginated list of consumers.
      operationId: listConsumers
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Paginated list of consumers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedConsumers'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [Consumers]
      summary: Create a new consumer
      description: |
        Creates a new consumer. Optionally, an initial credit amount can be provided
        which will be applied asynchronously to the consumer's fund.
      operationId: createConsumer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConsumerRequest'
      responses:
        '201':
          description: Consumer created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsumerResponse'
        '400':
          description: Validation error (empty name or negative initial_credit)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: A consumer with this name already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /consumers/{consumer_id}:
    get:
      tags: [Consumers]
      summary: Get a consumer by ID
      description: Returns a single consumer by their ID.
      operationId: getConsumerById
      parameters:
        - name: consumer_id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Consumer details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsumerResponse'
        '404':
          description: Consumer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags: [Consumers]
      summary: Update a consumer
      description: |
        Updates an existing consumer. Only the provided fields will be updated.
      operationId: updateConsumerById
      parameters:
        - name: consumer_id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateConsumerRequest'
      responses:
        '200':
          description: Consumer updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsumerResponse'
        '400':
          description: Validation error (empty name)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Consumer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: A consumer with this name already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /consumers_by_name/{name}:
    get:
      tags: [Consumers]
      summary: Get a consumer by name
      description: Returns a single consumer by their name.
      operationId: getConsumerByName
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Consumer details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsumerResponse'
        '404':
          description: Consumer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ==================== Funds ====================
  /consumers/{consumer_id}/fund:
    get:
      tags: [Funds]
      summary: Get a consumer's fund
      description: |
        Returns the fund (asset) information for a given consumer.
        If the consumer has no fund record yet, returns a default fund with zero balances.
      operationId: getConsumerFund
      parameters:
        - name: consumer_id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Fund details for the consumer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FundResponse'
        '404':
          description: Consumer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ==================== API Keys ====================
  /consumers/{consumer_id}/apikeys:
    get:
      tags: [API Keys]
      summary: List API keys for a consumer
      description: Returns a paginated list of API keys for a given consumer.
      operationId: listConsumerApiKeys
      parameters:
        - name: consumer_id
          in: path
          required: true
          schema:
            type: integer
            format: int32
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Paginated list of API keys
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedApiKeys'
        '404':
          description: Consumer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [API Keys]
      summary: Create an API key for a consumer
      description: Creates a new API key for the specified consumer.
      operationId: createConsumerApiKey
      parameters:
        - name: consumer_id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApiKeyRequest'
      responses:
        '201':
          description: API key created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenAIAPIKeyResponse'
        '404':
          description: Consumer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ==================== Deposits ====================
  /deposits:
    post:
      tags: [Balance Changes]
      summary: Create a deposit
      description: |
        Creates a deposit for a consumer. This creates a BalanceChange record and enqueues
        a task to apply it asynchronously. Deposits add to the consumer's cash balance.
        The `unique_request_id` field is a client-provided idempotency key.
      operationId: createDeposit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDepositRequest'
      responses:
        '201':
          description: Deposit created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalanceChangeResponse'
        '400':
          description: Validation error (non-positive amount)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Consumer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ==================== Withdrawals ====================
  /withdrawals:
    post:
      tags: [Balance Changes]
      summary: Create a withdrawal
      description: |
        Creates a withdrawal for a consumer. This first checks that the consumer's fund has
        sufficient cash (cash >= amount). If not, returns an error. Otherwise, creates
        a BalanceChange record and enqueues a task to apply it asynchronously.
        The `unique_request_id` field is a client-provided idempotency key.
      operationId: createWithdrawal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWithdrawRequest'
      responses:
        '201':
          description: Withdrawal created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalanceChangeResponse'
        '400':
          description: Validation error (non-positive amount or insufficient funds)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Consumer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ==================== Credits ====================
  /credits:
    post:
      tags: [Balance Changes]
      summary: Create a credit
      description: |
        Creates a credit for a consumer. This creates a BalanceChange record and enqueues
        a task to apply it asynchronously. Unlike deposits which add to the cash field,
        credits add to the credit field of the consumer's fund.
        The `unique_request_id` field is a client-provided idempotency key.
      operationId: createCredit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCreditRequest'
      responses:
        '201':
          description: Credit created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalanceChangeResponse'
        '400':
          description: Validation error (non-positive amount)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Consumer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ==================== Session Events ====================
  /sessionevents:
    get:
      tags: [Session Events]
      summary: List session events
      description: Returns a paginated list of session events with optional session_id filter.
      operationId: listSessionEvents
      parameters:
        - name: session
          in: query
          description: Filter by session_id
          required: false
          schema:
            type: string
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Paginated list of session events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedSessionEvents'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

tags:
  - name: Endpoints
    description: Manage OpenAI-compatible endpoints
  - name: Endpoint Tags
    description: Manage tags on endpoints
  - name: Endpoint Tests
    description: Test endpoint feature detection without saving
  - name: Models
    description: Manage OpenAI models
  - name: Consumers
    description: Manage consumers (users)
  - name: Funds
    description: View consumer fund balances
  - name: API Keys
    description: Manage consumer API keys
  - name: Balance Changes
    description: Deposits, withdrawals, and credits
  - name: Session Events
    description: View session event logs
